name: Build 5GMobileWiFi IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ipa:
    name: Build IPA
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.0'
        
    - name: Build for iOS
      run: |
        # 构建项目
        xcodebuild \
          -project "5GMobileWiFi.xcodeproj" \
          -scheme "5GMobileWiFi" \
          -configuration Release \
          -sdk iphoneos \
          -derivedDataPath ./DerivedData \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          clean build
        
        # 找到 .app 文件
        APP_PATH=$(find ./DerivedData -name "5GMobileWiFi.app" -type d | head -n 1)
        
        if [ -z "$APP_PATH" ]; then
            echo "❌ 找不到 .app 文件"
            exit 1
        fi
        
        echo "✅ 找到 .app: $APP_PATH"
        
        # 创建 Payload 目录
        mkdir -p Payload
        cp -R "$APP_PATH" Payload/
        
        # 压缩为 IPA
        zip -r "5GMobileWiFi.ipa" Payload/
        
        echo "✅ IPA 创建完成"
        
    - name: Upload IPA
      uses: actions/upload-artifact@v3
      with:
        name: 5GMobileWiFi-IPA
        path: 5GMobileWiFi.ipa
        retention-days: 30
